<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crear Votación</title>
  <link rel="stylesheet" href="../css/styles.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>
<body>
  <nav id="navbar">
    <div class="nav-left">
      <img src="../img/logo1.png" alt="Logo">
    </div>
    <a href="/dashboard" class="btn btn-outline-secondary btn-sm">← Volver</a>
  </nav>
  <div class="contenido">
    <h2 class="mb-1" data-aos="fade-down">Nueva votación</h2>
    <div data-aos="fade-up">
      <div class="mb-3">
        <label class="form-label fw-semibold" for="titulo">Nombre de la votación (Obligatorio)</label>
        <input class="form-control" type="text" id="titulo" placeholder="Ej. Elección Presidencial 2026">
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold" for="tipo">Tipo de votación</label>
        <select class="form-select" id="tipo" onchange="onTipoChange()">
          <option value="nacional">Nacional</option>
          <option value="distrital">Distrital</option>
          <option value="institucional">Institucional</option>
          <option value="partido">Partido</option>
          <option value="referendum">Referéndum</option>
        </select>
      </div>
      <div class="mb-3" id="grpDistrito" style="display:none;">
          <label class="form-label fw-semibold">Distrito</label>
          <select class="form-select" id="selDistrito"><option value="">Selecciona</option></select>
        </div>
        <div class="mb-3" id="grpCargo" style="display:none;">
          <label class="form-label fw-semibold">Cargo / institución</label>
          <select class="form-select" id="selCargo"><option value="">Selecciona</option></select>
        </div>
        <div class="mb-3" id="grpPartido" style="display:none;">
          <label class="form-label fw-semibold">Partido político</label>
          <select class="form-select" id="selPartido"><option value="">Selecciona</option></select>
        </div>
        <div class="mb-3">
          <label class="form-label">Fecha inicio (Obligatorio)</label>
          <input type="datetime-local" class="form-control" id="fecha_ini" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Fecha fin (Obligatorio)</label>
          <input type="datetime-local" class="form-control" id="fecha_fin" required>
        </div>
        <hr>
        <label class="form-label fw-semibold">Candidatos</label>
        <p class="text-muted" style="font-size:.85rem;">Selecciona los que aparecerán en esta votación.</p>
        <div id="candGrid">
        <p class="text-muted">Cargando candidatos</p>
      </div>
      <div id="nuevo-candidato" class="mt-3">
        <input class="form-control" type="text" id="nuevoCandNombre" placeholder="Nombre del nuevo candidato">
        <select class="form-select" id="nuevoCandPartido"><option value="">Sin partido</option></select>
        <button class="btn btn-outline-secondary" onclick="agregarCandidato()">Crear candidato</button>
      </div>
      <hr>
      <button class="btn btn-danger w-100" onclick="crearVotacion()">Crear votación</button>
      <div class="mt-3" id="alerta"></div>
    </div>
  </div>
  <script src="/js/JavaScript.js"></script>
  <script src="/js/crear-votacion.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>
    AOS.init();
  </script>
</body>
</html>
