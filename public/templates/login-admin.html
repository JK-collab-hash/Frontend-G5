<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login-Administrador</title>
  <link rel="stylesheet" href="../css/styles.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
  <div class="row vh-100 g-0">
    <div class="col-lg-6 position-relative d-none d-lg-block">
      <div class="bg-bg"></div>
    </div>
    <div class="col-lg-6 body-bg">
      <div class="row align-items-center justify-content-center h-100 g-0 px-4 px-sm-0">
        <div class="col col-sm-6 col-lg-7 col-xl-6">
          <div class="text-center mb-4">
            <p class="text-secondary fw-bold">Solo personal autorizado. Ingresa tus credenciales.</p>
          </div>
          <!-- Formulario de login admin -->
          <div id="login-wrap">
            <div class="mb-3">
              <label class="form-label fw-semibold" for="dni">DNI del administrador</label>
              <input class="form-control form-control-lg" type="text" id="dni" placeholder="Ej. 00000000" maxlength="8"
                oninput="this.value=this.value.replace(/\D/,'')" autocomplete="off">
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold" for="pass">Contraseña</label>
              <input class="form-control form-control-lg" type="password" id="pass" placeholder="********" autocomplete="off">
            </div>
            <button class="btn btn-danger btn-lg w-100 rounded-3 fw-semibold" onclick="ingresar()">Acceder al panel</button>
            <div class="mt-3" id="alerta"></div>
            <p class="text-muted mt-3"><a class="text-decoration-none text-danger" href="/login-usuario">Volver al ingreso de usuarios</a></p>
          </div>
        </div>
      </div>
    </div>
  <script src="/js/login.js"></script>
  <script src="/js/JavaScript.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>   
</body>
</html>
