<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nuevo Administrador</title>
  <link rel="stylesheet" href="../css/styles.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>
<body>
  <nav id="navbar">
    <div class="nav-left">
      <img src="../img/logo1.png" alt="Logo">
      <span class="nav-titulo">Nuevo Administrador</span>
    </div>
    <a href="/dashboard" class="btn btn-outline-secondary btn-sm">← Volver</a>
  </nav>
  <div class="contenido">
    <h2 class="mb-1" data-aos="fade-down">Crear administrador</h2>
    <div data-aos="fade-up">
      <div class="mb-3">
        <label class="form-label fw-semibold" for="dni">DNI del administrador (Obligatorio)</label>
        <input class="form-control" type="text" id="dni" placeholder="Ej. 87654321" maxlength="8"
          oninput="this.value=this.value.replace(/\D/,'')">
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold" for="pass">Contraseña</label>
        <input class="form-control" type="password" id="pass" placeholder="Mínimo 6 caracteres">
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold" for="pass2">Confirmar contraseña</label>
        <input class="form-control" type="password" id="pass2" placeholder="Repite la contraseña">
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold" for="distrito">Distrito (Obligatorio)</label>
        <select class="form-select" id="distrito">
          <option value="">Selecciona un distrito</option>
        </select>
      </div>
      <button class="btn btn-danger w-100" onclick="crear()">Crear administrador</button>
      <div class="mt-3" id="alerta"></div>
    </div>
  </div>
  <script src="/js/agregar-admin.js"></script>
  <script src="/js/JavaScript.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>
    AOS.init();
  </script>
</body>
</html>
