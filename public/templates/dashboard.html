<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link rel="stylesheet" href="../css/styles.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>
<body>
  <nav id="navbar">
    <div class="nav-left">
      <img src="../img/logo1.png" alt="Logo">
    </div>
    <!-- Acciones rápidas en el centro/medio del navbar -->
    <div class="nav-acciones d-flex gap-2">
      <a href="/agregar-usuario" class="btn btn-outline-secondary btn-sm">Agregar votante</a>
      <a href="/agregar-admin" class="btn btn-outline-secondary btn-sm">Nuevo admin</a>
      <a href="/crear-votacion" class="btn btn-danger btn-sm">Crear votación</a>
    </div>
    <button class="btn-salir" onclick="cerrarSesion()">Salir</button>
  </nav>
  <div class="contenido">
    <div class="row g-3 mb-4" data-aos="fade-down">
      <div class="col-auto">
        <div class="stat-card">
          <span class="stat-num" id="statVotaciones">—</span>
          <span class="stat-lbl">Votaciones activas</span>
        </div>
      </div>
    </div>
    <div class="tab-barra" data-aos="fade-up">
      <button class="activo" onclick="switchTab('resultados', this)">Resultados</button>
      <button onclick="switchTab('votar', this)">Emitir voto</button>
    </div>
    <div id="tab-resultados">
      <div id="resultadosContainer">
        <p class="text-muted">Cargando resultados...</p>
      </div>
    </div>
    <div id="tab-votar" style="display:none;">
      <p class="text-muted mb-3">Como administrador puedes emitir un voto, pero no puedes modificar resultados.</p>
      <div class="mb-3">
        <label class="form-label fw-semibold">Seleccionar votación</label>
        <select class="form-select" id="selVotAdmin" onchange="cargarCandidatosAdmin()">
          <option value="">Elige una votación</option>
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Candidato</label>
        <select class="form-select" id="selCandAdmin">
          <option value="">Selecciona votación</option>
        </select>
      </div>
      <button class="btn btn-danger" onclick="votarAdmin()">Emitir voto</button>
      <div class="mt-3" id="msgAdmin"></div>
    </div>
  </div>
  <script src="/js/dashboard.js"></script>
  <script src="/js/JavaScript.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>
    AOS.init();
  </script>
</body>
</html>
