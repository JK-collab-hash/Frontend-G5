<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link rel="stylesheet" href="../css/styles.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>
<body>
  <nav id="navbar">
    <div class="nav-left">
      <img src="../img/logo1.png" alt="Logo">
    </div>
    <div class="nav-acciones d-flex gap-2">
      <a href="/agregar-usuario" class="btn btn-outline-secondary btn-sm">Agregar cuenta</a>
      <a href="/gestion-cuenta" class="btn btn-outline-secondary btn-sm">Ver cuentas</a>
      <a href="/agregar-organizacion" class="btn btn-outline-secondary btn-sm">Agregar organización</a>
      <a href="/gestion-catalogo" class="btn btn-outline-secondary btn-sm">Gestión</a>
      <a href="/crear-votacion" class="btn btn-danger btn-sm">Crear elección</a>
    </div>
    <button class="btn-salir" onclick="cerrarSesion()">Salir</button>
  </nav>
  <div class="contenido">
    <div class="card border-0 shadow-sm mb-4 p-3" data-aos="fade-down">
      <strong id="wNombre">Cargando...</strong>
      <span class="text-muted d-block" id="wDetalle"></span>
    </div>
    <div class="row g-3 mb-4" data-aos="fade-down">
      <div class="col-auto">
        <div class="stat-card">
          <span class="stat-num" id="statVotaciones">—</span>
          <span class="stat-lbl">Votaciones activas</span>
        </div>
      </div>
    </div>
    <div class="tab-barra" data-aos="fade-up">
      <button class="activo" onclick="switchTab('resultados', this)">Resultados</button>
      <button onclick="switchTab('votar', this)">Emitir voto</button>
      <button onclick="switchTab('registro', this)">Registro</button>
    </div>
    <div id="tab-resultados">
      <div id="resultadosContainer">
        <p class="text-muted">Cargando...</p>
      </div>
    </div>
    <div id="tab-votar" style="display:none;">
      <div class="mb-3">
        <label class="form-label fw-semibold">Seleccionar votación</label>
        <select class="form-select" id="selVotAdmin" onchange="actualizarAccionVotoAdmin()">
          <option value="">Elige una votación</option>
        </select>
      </div>

      <div id="bloque-candidato-admin">
        <div class="mb-3">
          <label class="form-label fw-semibold">Candidato</label>
          <select class="form-select" id="selCandAdmin">
            <option value="">Selecciona votación</option>
          </select>
        </div>
        <button class="btn btn-danger" onclick="votarAdmin()">Emitir voto</button>
      </div>

      <div id="bloque-referendum-admin" style="display:none;">
        <p class="fw-semibold" id="normaInfoAdmin"></p>
        <button class="btn btn-success me-2" onclick="votarReferendumAdmin('a_favor')">A favor</button>
        <button class="btn btn-outline-danger" onclick="votarReferendumAdmin('en_contra')">En contra</button>
      </div>
      <div class="mt-3" id="msgAdmin"></div>
    </div>
    <div id="tab-registro" style="display:none;">
      <div id="registroContainer">
        <p class="text-muted">Cargando...</p>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/JavaScript.js"></script>
  <script src="/js/dashboard.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>
    AOS.init();
  </script>
</body>
</html>
