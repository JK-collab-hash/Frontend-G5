<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login-Usuario</title>
  <link rel="stylesheet" href="../css/styles.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
  <div class="row vh-100 g-0">
      <div class="col-lg-6 position-relative d-none d-lg-block">
      <div class="bg-bg"></div>
    </div>
    <div class="col-lg-6 body-bg">
      <div class="row align-items-center justify-content-center h-100 g-0 px-4 px-sm-0">
        <div class="col col-sm-6 col-lg-7 col-xl-6">
          <div>
            <div class="text-center m-5-auto">
              <p class="text-secondary fw-bold">Ingresa tu DNI para acceder a tus opciones de votación.</p>
              <div id="login-wrap">
                <div class="mb-3">
                  <label class="form-label fw-semibold" for="dni">Número de DNI</label>
                  <input class="form-control form-control-lg" type="text" id="dni" placeholder="Ej. 12345678" maxlength="8"
                    oninput="this.value=this.value.replace(/\D/,'')" autocomplete="off">
                </div>
                <button class="btn btn-danger btn-lg rounded-3 fw-semibold shadow-sm" onclick="ingresar()">Ingresar al sistema</button>
                <div class="mt-3" id="alerta"></div>
                <p class="text-muted">¿Eres administrador? <a class="text-decoration-none text-info" href="/login-admin">Accede aquí</a></p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="/js/login.js"></script>
  <script src="/js/JavaScript.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
